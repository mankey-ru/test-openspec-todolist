# openspec/config.yaml
# OpenSpec Configuration - Reference Model
# Industry-wide artifacts are the single source of truth for agnostic content.
# OpenSpec only orchestrates, references, and adds tool-specific extensions.

version: "1.0"
mode: reference

# Artifact Ownership Matrix - Industry files are masters
artifacts:
  industry_wide:
    AGENTS.md:
      path: "/AGENTS.md"
      description: "AI agent behavior and interaction rules (industry standard)"
      open_spec_extension: "openspec/specs/agents-extension.spec.md"
    CONVENTIONS.md:
      path: "/CONVENTIONS.md"
      description: "Project conventions and contribution guidelines"
      open_spec_extension: "openspec/specs/conventions-extension.spec.md"
    CODE_STYLE.md:
      path: "/CODE_STYLE.md"
      description: "Code style and formatting rules"
      open_spec_extension: "openspec/specs/code-style-extension.spec.md"
    .editorconfig:
      path: "/.editorconfig"
      description: "EditorConfig file for consistent coding style across different editors and IDEs"
      open_spec_extension: null
    GLOSSARY.md:
      path: "/GLOSSARY.md"
      description: "Project glossary and terminology"
      open_spec_extension: null
    SKILLS.md:
      path: "/SKILLS.md"
      description: "Agent and team skills matrix"
      open_spec_extension: "openspec/specs/skills-extension.spec.md"

  openspec_specific:
    - "openspec/specs/continue-rules.spec.md"
    - "openspec/specs/openspec-workflow.spec.md"

# Rules for AI tools (Continue.dev, etc.)
continue:
  preferred_sources:
    - root_industry_files
    - openspec_extensions
  rules_directory: ".continue/rules"

# General constraints
enforce_no_duplication: true
require_english: true
industry_compatibility: "maximum"
project: "test-openspec-todolist (ToDoList application)"