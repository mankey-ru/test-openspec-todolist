<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Todo Web App</title>
  <link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxNiIgaGVpZ2h0PSIxNiI+PGNpcmNsZSBjeD0iOCIgY3k9IjgiIHI9IjYiIGZpbGw9IiNmZjAwYWEiLz48L3N2Zz4=" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    body {
      font-family: 'Inter', sans-serif;
      background-color: #121212 !important;
    }

    @media (hover: hover) {
      .action-btn-container {
        opacity: 0;
        pointer-events: none;
      }
      .list-group-item:hover .action-btn-container {
        opacity: 1;
        pointer-events: auto;
      }
    }
  </style>
</head>

<body class="d-flex align-items-center justify-content-center min-vh-100 p-4">

  <div class="card shadow-lg w-100 bg-dark"
    style="max-width: 1200px; border-radius: 1rem; border-color: rgba(255,255,255,0.1);">
    <div class="row g-0">
      
      <!-- SIDEBAR -->
      <div class="col-md-4 border-end border-secondary p-4 p-sm-5 d-flex flex-column" style="min-height: 60vh;">
        <h4 class="fw-bold text-primary mb-4">My Lists</h4>
        
        <div class="d-flex gap-2 mb-4">
          <input type="text" id="list-input" placeholder="New list name..."
            class="form-control border-secondary shadow-none bg-dark text-light">
          <button id="add-list-btn" title="Add List" class="btn btn-outline-primary d-flex align-items-center justify-content-center">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-plus-lg" viewBox="0 0 16 16">
              <path stroke="currentColor" stroke-width="1.5" d="M8 2v12m6-6H2" />
            </svg>
          </button>
        </div>

        <ul id="lists-container" class="list-group list-group-flush overflow-auto flex-grow-1 border-top border-secondary">
          <!-- Lists injected dynamically -->
        </ul>
      </div>

      <!-- MAIN TASK VIEW -->
      <div class="col-md-8 p-4 p-sm-5 d-flex flex-column">
        
        <div id="zero-state-ui" class="text-center d-none my-auto">
          <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" fill="currentColor" class="bi bi-folder-x text-secondary mb-3 mx-auto" viewBox="0 0 16 16">
            <path d="M.54 3.87.5 3a2 2 0 0 1 2-2h3.672a2 2 0 0 1 1.414.586l.828.828A2 2 0 0 0 9.828 3h3.982a2 2 0 0 1 1.992 2.181L15.546 8H14.54l.265-2.91A1 1 0 0 0 13.81 4H2.19a1 1 0 0 0-.996 1.09l.637 7a1 1 0 0 0 .995.91H9v1H2.826a2 2 0 0 1-1.991-1.819l-.637-7a2 2 0 0 1 .342-1.31zm6.339-1.576A1 1 0 0 0 6.172 2H2.5a1 1 0 0 0-1 .981l.006.139C1.72 3.042 1.95 3 2.19 3h5.396l-.707-.707z"/>
            <path d="M11.854 10.146a.5.5 0 0 0-.707.708L12.293 12l-1.146 1.146a.5.5 0 0 0 .707.708L13 12.707l1.146 1.147a.5.5 0 0 0 .708-.708L13.707 12l1.147-1.146a.5.5 0 0 0-.708-.708L13 11.293l-1.146-1.147z"/>
          </svg>
          <h5 class="text-light">No lists available</h5>
          <p class="text-secondary mb-0">Create a new list in the sidebar to get started.</p>
        </div>

        <div id="active-list-ui" class="d-flex flex-column h-100">
          <header class="text-center mb-4">
            <h2 id="current-list-title" class="fw-bold text-primary mb-1 tracking-tight">
              My Tasks
            </h2>
            <p class="text-secondary small mb-0 fw-medium">Manage your goals</p>
          </header>

          <div class="d-flex gap-2 mb-4">
            <input type="text" id="task-input" placeholder="New task name"
              class="form-control form-control-lg border-secondary shadow-none bg-dark text-light">
            <button id="add-task-btn" title="Add Task"
              class="btn btn-primary btn-lg d-flex align-items-center justify-content-center">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-plus-lg"
                viewBox="0 0 16 16">
                <path stroke="currentColor" stroke-width="1.5" d="M8 2v12m6-6H2" />
              </svg>
            </button>
          </div>

          <ul id="task-list" class="list-group list-group-flush overflow-auto border-top border-secondary flex-grow-1"
            style="max-height: 55vh;">
            <!-- Tasks injected dynamically -->
          </ul>
        </div>
        
      </div>
    </div>
  </div>

  <script src="./src/app.js"></script>
</body>

</html>
